<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação Gangorra Hexágono Rolando</title>
    <style>
        /* Estilos do Fundo */
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* Fundo Preto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal */
        .gangorra-container {
            position: relative;
            width: 400px; /* Largura da gangorra */
            height: 200px; /* Altura da área da animação */
            /* Aplicamos a mesma rotação ao container todo para a gangorra e o hexágono 
               inclinarem juntos perfeitamente */
            animation: gangorra-movimento 6s ease-in-out infinite;
            transform-origin: center bottom;
        }

        /* O Braço da Gangorra (o traço reto branco) */
        .gangorra-traco {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px; /* Espessura do traço */
            background-color: white; /* Cor Branca */
        }

        /* O Hexágono Branco */
        .hexagono {
            position: absolute;
            width: 50px; /* Largura do hexágono */
            height: 28.87px; /* Altura proporcional */
            background-color: white; /* Cor Branca */
            
            /* Posiciona o hexágono logo acima do traço */
            bottom: 4px; 
            left: 0;

            /* Criação do formato de hexágono usando clip-path */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            
            /* Ponto de rotação no centro do próprio hexágono */
            transform-origin: center center;

            /* Animação do hexágono rolando de um lado para o outro */
            animation: hexagono-rolando 6s ease-in-out infinite;
        }

        /* Definição das Animações (Keyframes) */

        /* 1. Faz a gangorra inteira inclinar */
        @keyframes gangorra-movimento {
            0% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(12deg); /* Inclina para a direita, fazendo o hexágono descer */
            }
            50% {
                transform: rotate(0deg); /* Volta ao centro */
            }
            75% {
                transform: rotate(-12deg); /* Inclina para a esquerda, fazendo o hexágono descer */
            }
            100% {
                transform: rotate(0deg);
            }
        }

        /* 2. Faz o hexágono rolar de uma ponta à outra */
        @keyframes hexagono-rolando {
            0% {
                /* Começa no centro */
                transform: translateX(175px) rotate(0deg);
            }
            25% {
                /* Vai até a ponta direita (400px - 50px de largura = 350px) e gira */
                transform: translateX(350px) rotate(360deg);
            }
            50% {
                /* Volta para o centro */
                transform: translateX(175px) rotate(0deg);
            }
            75% {
                /* Vai até a ponta esquerda (0px) e gira no sentido inverso */
                transform: translateX(0px) rotate(-360deg);
            }
            100% {
                /* Retorna ao centro */
                transform: translateX(175px) rotate(0deg);
            }
        }
    </style>
</head>
<body>

    <div class="gangorra-container">
        <div class="hexagono"></div>
        <div class="gangorra-traco"></div>
    </div>

</body>
</html>

</body>
</html>
