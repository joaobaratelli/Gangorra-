<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gangorra Contínua</title>
    <style>
        /* Estilo do Fundo e Reset */
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* O "Mundo" onde a animação acontece */
        .cena {
            position: relative;
            width: 500px;
            height: 300px;
        }

        /* A Linha da Gangorra */
        .gangorra {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -2px; /* Ajuste fino para o centro */
            margin-left: -210px; /* Metade de 420px */
            width: 420px;
            height: 4px;
            background-color: white;
            border-radius: 4px;
            
            /* Ponto de equilíbrio no centro exato */
            transform-origin: center center;
            animation: gangorra-inclinacao 4s ease-in-out infinite;
        }

        /* Container que transporta o hexágono de um lado ao outro */
        .hexagono-wrapper {
            position: absolute;
            bottom: 4px; /* Grudado perfeitamente em cima da barra */
            left: 50%;
            margin-left: -30px; /* Centraliza o eixo */
            width: 60px;
            height: 51.96px; /* Proporção matemática perfeita do hexágono */
            
            /* Animação de translação contínua de ponta a ponta */
            animation: hexagono-deslize 4s ease-in-out infinite;
        }

        /* O Hexágono que gira no próprio eixo */
        .hexagono {
            width: 100%;
            height: 100%;
            background-color: white;
            
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            
            /* Animação de rotação contínua */
            animation: hexagono-giro 4s ease-in-out infinite;
        }

        /* --- KEYFRAMES (MOVIMENTO CONTÍNUO) --- */

        /* 1. A Gangorra agora alterna direto de uma ponta à outra */
        @keyframes gangorra-inclinacao {
            0%, 100% { transform: rotate(-12deg); } /* Começa inclinada para a esquerda */
            50% { transform: rotate(12deg); }      /* Vai direto para a direita */
        }

        /* 2. O Hexágono viaja de -180px até +180px sem parar no meio */
        @keyframes hexagono-deslize {
            0%, 100% { transform: translateX(-180px); } /* Fica na ponta esquerda */
            50% { transform: translateX(180px); }       /* Viaja direto até a ponta direita */
        }

        /* 3. A Tração: O giro acompanha a distância total percorrida (720 graus = 2 voltas) */
        @keyframes hexagono-giro {
            0%, 100% { transform: rotate(-360deg); }
            50% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="cena">
        <div class="gangorra">
            <div class="hexagono-wrapper">
                <div class="hexagono"></div>
            </div>
        </div>
    </div>

</body>
</html>
