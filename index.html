<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gangorra - Equilíbrio Contínuo</title>
    <style>
        /* Estilo do Fundo e Reset */
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* O "Mundo" onde a animação acontece */
        .cena {
            position: relative;
            width: 500px;
            height: 300px;
        }

        /* A Linha da Gangorra */
        .gangorra {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -2px; /* Ajuste fino para o centro */
            margin-left: -210px; /* Metade de 420px */
            width: 420px;
            height: 4px;
            background-color: white;
            border-radius: 4px;
            
            /* Ponto de equilíbrio no centro exato */
            transform-origin: center center;
            /* Usamos 'linear' para não ter paradas ou desaceleração */
            animation: gangorra-inclinacao 3.5s linear infinite alternate;
        }

        /* Container que transporta o hexágono */
        .hexagono-wrapper {
            position: absolute;
            bottom: 4px; /* Grudado na linha */
            left: 50%;
            margin-left: -30px; /* Centraliza o eixo */
            width: 60px;
            height: 51.96px; /* Geometria proporcional perfeita */
            
            /* Movimento linear contínuo */
            animation: hexagono-deslize 3.5s linear infinite alternate;
        }

        /* O Hexágono que gira */
        .hexagono {
            width: 100%;
            height: 100%;
            background-color: white;
            
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            
            /* Rotação linear contínua */
            animation: hexagono-giro 3.5s linear infinite alternate;
        }

        /* --- KEYFRAMES (SEM PARADAS) --- */

        /* Usar 'alternate' faz a animação ir de 0% a 100% e voltar de forma contínua */

        /* 1. A inclinação vai de um extremo ao outro sem desacelerar */
        @keyframes gangorra-inclinacao {
            0% { transform: rotate(-12deg); }
            100% { transform: rotate(12deg); }
        }

        /* 2. O hexágono desliza de uma ponta à outra da linha */
        @keyframes hexagono-deslize {
            0% { transform: translateX(-180px); }
            100% { transform: translateX(180px); }
        }

        /* 3. O giro acompanha a rolagem perfeitamente */
        @keyframes hexagono-giro {
            0% { transform: rotate(-360deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="cena">
        <div class="gangorra">
            <div class="hexagono-wrapper">
                <div class="hexagono"></div>
            </div>
        </div>
    </div>

</body>
</html>
