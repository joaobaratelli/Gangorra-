<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação Gangorra Hexágono</title>
    <style>
        /* Estilos do Fundo */
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* Fundo Preto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Evita barras de rolagem */
        }

        /* Container Principal da Gangorra */
        .gangorra-container {
            position: relative;
            width: 400px; /* Largura da gangorra */
            height: 200px; /* Altura da área de animação */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinha a gangorra na parte inferior do container */
        }

        /* O Braço da Gangorra (o traço reto branco) */
        .gangorra-traco {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%; /* Ocupa toda a largura do container */
            height: 4px; /* Espessura do traço */
            background-color: white; /* Cor Branca */
            transform-origin: center bottom; /* Ponto de rotação no centro inferior */
            
            /* Animação do braço da gangorra */
            animation: gangorra-movimento 4s ease-in-out infinite;
        }

        /* O Hexágono Branco */
        .hexagono {
            position: absolute;
            width: 60px; /* Largura do hexágono */
            height: 34.64px; /* Altura proporcional do hexágono (width * sqrt(3)/2) */
            background-color: white; /* Cor Branca */
            
            /* Posição inicial no topo da gangorra (centro) */
            top: -34.64px; /* Ajusta para ficar acima do traço */
            left: calc(50% - 30px); /* Centraliza horizontalmente */

            /* Criação do formato de hexágono usando clip-path */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            
            transform-origin: center bottom; /* Ponto de rotação no centro inferior do hexágono */

            /* Animação do hexágono acompanhando o braço */
            animation: hexagono-movimento 4s ease-in-out infinite;
        }

        /* Definição das Animações (Keyframes) */

        /* Animação do Movimento da Gangorra (Rotação) */
        @keyframes gangorra-movimento {
            0% {
                transform: rotate(0deg); /* Posição inicial (plana) */
            }
            25% {
                transform: rotate(15deg); /* Sobe do lado esquerdo (inclina para a direita) */
            }
            50% {
                transform: rotate(0deg); /* Volta à posição plana */
            }
            75% {
                transform: rotate(-15deg); /* Sobe do lado direito (inclina para a esquerda) */
            }
            100% {
                transform: rotate(0deg); /* Volta à posição plana */
            }
        }

        /* Animação do Movimento do Hexágono (Acompanha a inclinação) */
        @keyframes hexagono-movimento {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                /* Desloca um pouco para a direita e rotaciona junto com o braço */
                transform: translate(10px, 2px) rotate(15deg);
            }
            50% {
                transform: translate(0, 0) rotate(0deg);
            }
            75% {
                /* Desloca um pouco para a esquerda e rotaciona junto com o braço */
                transform: translate(-10px, 2px) rotate(-15deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }
    </style>
</head>
<body>

    <div class="gangorra-container">
        <div class="gangorra-traco">
            <div class="hexagono"></div>
        </div>
    </div>

</body>
</html>
