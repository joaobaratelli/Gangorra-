<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilíbrio Dinâmico Perpétuo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .cena {
            position: relative;
            width: 600px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* A Linha da Gangorra */
        .gangorra {
            position: absolute;
            width: 450px;
            height: 4px;
            background-color: white;
            border-radius: 2px;
            transform-origin: center center;
            /* Animação com curva de seno para manter a fluidez */
            animation: inclinacao 1.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
        }

        /* Container do Hexágono */
        .hexagono-wrapper {
            position: absolute;
            bottom: 4px; /* Sobre a linha */
            left: 50%;
            margin-left: -30px;
            width: 60px;
            height: 51.96px;
            /* O movimento lateral precisa ser idêntico ao tempo da gangorra */
            animation: deslize 1.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
        }

        /* O Hexágono propriamente dito */
        .hexagono {
            width: 100%;
            height: 100%;
            background-color: white;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            /* Rotação contínua para simular tração */
            animation: giro 1.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
        }

        /* --- FÍSICA DO MOVIMENTO --- */

        @keyframes inclinacao {
            0% { transform: rotate(-18deg); }
            100% { transform: rotate(18deg); }
        }

        @keyframes deslize {
            /* Ele percorre quase toda a barra, chegando no limite sem cair */
            0% { transform: translateX(-195px); }
            100% { transform: translateX(195px); }
        }

        @keyframes giro {
            /* O giro acompanha a distância para não parecer que está deslizando no gelo */
            0% { transform: rotate(-360deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="cena">
        <div class="gangorra">
            <div class="hexagono-wrapper">
                <div class="hexagono"></div>
            </div>
        </div>
    </div>

</body>
</html>
