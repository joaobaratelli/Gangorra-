<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gangorra Infinita - Hexágono Regular</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* O ponto central onde a gangorra se apoia */
        .suporte {
            position: relative;
            width: 500px; /* Largura total da área da gangorra */
            height: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* A linha da gangorra */
        .gangorra {
            position: absolute;
            width: 100%;
            height: 4px;
            background-color: white;
            border-radius: 2px;
            /* Animação de inclinação */
            animation: inclinar 5s ease-in-out infinite;
        }

        /* O Hexágono Regular */
        .hexagono {
            position: absolute;
            /* Para ser regular, a altura é ~86.6% da largura */
            width: 60px;
            height: 51.96px; 
            background-color: white;
            
            /* Posicionamento: 'bottom: 4px' para ficar em cima da linha */
            bottom: 4px;
            left: 50%;
            margin-left: -30px; /* Centraliza o hexágono no meio da barra */

            /* Desenho do Hexágono Proporcional */
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);

            /* Animação de rolagem sincronizada */
            animation: rolar 5s ease-in-out infinite;
        }

        /* KEYFRAMES */

        /* A gangorra sobe e desce as pontas */
        @keyframes inclinar {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); } /* Lado direito desce */
            75% { transform: rotate(-15deg); } /* Lado esquerdo desce */
        }

        /* O hexágono desliza e gira sem sair das bordas */
        @keyframes rolar {
            0%, 100% { 
                transform: translateX(0) rotate(0deg); 
            }
            25% { 
                /* Move para a direita (250px é metade da barra, 
                   subtraímos um pouco para não cair da ponta) */
                transform: translateX(210px) rotate(360deg); 
            }
            75% { 
                /* Move para a esquerda */
                transform: translateX(-210px) rotate(-360deg); 
            }
        }
    </style>
</head>
<body>

    <div class="suporte">
        <div class="gangorra">
            <div class="hexagono"></div>
        </div>
    </div>

</body>
</html>
